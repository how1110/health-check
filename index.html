<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新北市蘆洲區忠義國民小學員工健檢補助查詢系統</title>
    <style>
        :root {
            --bg-light: #fdfdfd;
            --main-blue: #005bac;
            --accent-yellow: #ffec00;
            --gradient-header: linear-gradient(to right, #fff100 0%, #ffbb00 45%, #00a0e9 100%);
            --font-family: "標楷體", "DFKai-SB", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: #e8f4fa;
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .window-frame {
            background-color: white;
            max-width: 950px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 2px solid #ccc;
        }

        .page-header {
            background: var(--gradient-header);
            padding: 25px;
            display: flex;
            align-items: center;
            border-bottom: 3px solid var(--main-blue);
        }

        .school-logo-mock {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--main-blue);
            margin-right: 20px;
            border: 2px solid #005bac;
            font-size: 20px;
            flex-shrink: 0;
        }

        .title-text {
            color: var(--main-blue);
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            line-height: 1.3;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff;
            letter-spacing: 2px;
        }

        .main-content {
            padding: 35px;
            background-color: #f9fcff;
        }

        .instruction {
            font-size: 20px;
            color: #444;
            margin-bottom: 25px;
            font-weight: bold;
            border-left: 6px solid #ffbb00;
            padding-left: 15px;
        }

        .select-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) { .select-group { grid-template-columns: 1fr; } }

        label {
            display: block;
            margin-bottom: 12px;
            font-size: 18px;
            color: var(--main-blue);
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 17px;
            font-family: var(--font-family);
            background-color: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--main-blue);
        }

        #result-display {
            display: none;
            background-color: #fff;
            border: 2px solid #00a0e9;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: grid;
            grid-template-columns: 160px 1fr;
            margin-bottom: 20px;
            font-size: 19px;
            align-items: flex-start;
        }

        .res-label {
            color: #fff;
            background-color: var(--main-blue);
            padding: 4px 12px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            margin-right: 20px;
        }

        .res-value {
            color: #222;
            line-height: 1.6;
            font-weight: bold;
        }

        .highlight-money {
            color: #d93025;
            font-size: 24px;
            font-weight: 900;
            background: #fff8f8;
            padding: 2px 8px;
            border: 1px solid #ffcfcf;
        }

        .note-text {
            color: #666;
            font-size: 16px;
            font-style: italic;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 20px;
        }

        .watermark {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 60px;
            color: rgba(0, 160, 233, 0.05);
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>

            </div>
        </div>

        <div id="result-display">
            <div class="watermark">忠義國小</div>
            <div class="result-item">
                <span class="res-label">最高補助額度</span>
                <span id="v-money" class="res-value highlight-money"></span>
            </div>
            <div class="result-item">
                <span class="res-label">建議檢查頻率</span>

            <div class="result-item">

            <div class="result-item">

                <span id="v-law" class="res-value" style="font-size:16px;"></span>
            </div>
            <div id="v-note" class="note-text"></div>
        </div>
    </div>
</div>

const roleEl = document.getElementById('roleInput');
const ageEl = document.getElementById('ageInput');
const resDiv = document.getElementById('result-display');

// 【修改處】自定義排序清單
const customOrder = [
    "校長",
    "編制內教職員工（教師、行政人員）",
    "工友／技工／駕駛",
    "約聘僱人員",
    "非編制人員",
    "代理教師（現職服務滿6個月以上）",
    "臨時人員",
    "依中央法規或補助及其他經費進用之人員"
];

// 初始化職稱下拉（使用自定義排序）
customOrder.forEach(r => {
    let o = new Option(r, r);
    roleEl.add(o);
});

function filterAgeOptions() {
    ageEl.innerHTML = '<option value="">-- 請選擇年齡基準 (受檢前一年底計) --</option>';
    resDiv.style.display = 'none';
    
    if(!roleEl.value) {
        ageEl.disabled = true;
        return;
    }
    
    const matched = healthCheckDB.filter(i => i.r === roleEl.value);
    matched.forEach(i => {
        let o = new Option(i.a, i.a);
        ageEl.add(o);
    });
    ageEl.disabled = false;
}

function displayDetails() {
    if(!ageEl.value) {
        resDiv.style.display = 'none';
        return;
    }
    
    const data = healthCheckDB.find(i => i.r === roleEl.value && i.a === ageEl.value);
    document.getElementById('v-money').innerText = data.m;
    document.getElementById('v-freq').innerText = data.f;
    document.getElementById('v-holiday').innerText = data.h;
    document.getElementById('v-law').innerText = data.l;
    document.getElementById('v-note').innerText = data.n ? "※ 備註：" + data.n : "";
    resDiv.style.display = 'block';
}
</script>

</html>
